NODES.forEach(n=>nodeMap[n.id]=n);

function App(){
  const [pan,setPan]=useState({x:16,y:16});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState(null);
  const [selected,setSelected]=useState(null);
  const [showTable,setShowTable]=useState(false);
  const [tFilter,setTFilter]=useState('all');

  const onMouseDown=useCallback(e=>{
    if(e.target.closest('.nd'))return;
    setDragging(true);
    setDragStart({x:e.clientX-pan.x,y:e.clientY-pan.y});
    setSelected(null);
  },[pan]);
  const onMouseMove=useCallback(e=>{
    if(!dragging||!dragStart)return;
    setPan({x:e.clientX-dragStart.x,y:e.clientY-dragStart.y});
  },[dragging,dragStart]);
  const onMouseUp=useCallback(()=>setDragging(false),[]);

  // Connected node ids when one is selected
  const connectedSet = selected ? new Set([
    selected,
    ...EDGES.filter(e=>e.f===selected||e.t===selected).flatMap(e=>[e.f,e.t])
  ]) : null;

  const getSel=()=>selected?nodeMap[selected]:null;

  // Edge path: smooth bezier, horizontal flow
  const edgePath=(f,t)=>{
    const fn=nodeMap[f],tn=nodeMap[t];
    if(!fn||!tn)return'';
    const x1=fn.x+NW, y1=fn.y+NH/2;
    const x2=tn.x,     y2=tn.y+NH/2;
    const dx=(x2-x1)*0.55;
    return `M${x1} ${y1} C${x1+dx} ${y1} ${x2-dx} ${y2} ${x2} ${y2}`;
  };

  const ecol=e=>{
    if(e.includes('Health'))return'#fb7185';
    if(e.includes('Jetpack'))return'#7dd3fc';
    if(e.includes('Stamina'))return'#2dd4bf';
    if(e.includes('Hazard'))return'#fbbf24';
    return'#a78bfa';
  };

  const tableRows=tFilter==='all'?TABLE_DATA:TABLE_DATA.filter(r=>r[4].toLowerCase().includes(tFilter));

  // Detail card positioning: clamp inside viewport
  const selNode=getSel();
  const cardX=selNode?Math.min(selNode.x+pan.x+NW+12, window.innerWidth-320):0;
  const cardY=selNode?Math.min(Math.max(selNode.y+pan.y+56,60),window.innerHeight-280):0;

  return(
    <div style={{width:'100%',height:'100vh',background:'#06030a',overflow:'hidden',position:'relative',fontFamily:"'DM Sans',sans-serif"}}>

      {/* TOP BAR */}
      <div style={{position:'fixed',top:0,left:0,right:0,zIndex:500,height:46,
        background:'rgba(6,3,10,.97)',borderBottom:'1px solid rgba(217,70,239,.2)',
        display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',backdropFilter:'blur(8px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontFamily:"'DM Serif Display',serif",fontStyle:'italic',fontSize:18,color:'#d946ef'}}>
            Galactic Cooking
          </span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:'rgba(217,70,239,.4)',textTransform:'uppercase'}}>
            Best outputs left → ingredients right · click any node
          </span>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          {/* Legend */}
          {[['health','#fb7185','S Health'],['jetpack','#7dd3fc','A Jetpack'],['stamina','#2dd4bf','B Stamina'],['hazard','#fbbf24','C Hazard'],['batter','#d946ef','Batter'],['raw','#34d399','Raw']].map(([k,c,l])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:c}}/>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:c,letterSpacing:1,textTransform:'uppercase'}}>{l}</span>
            </div>
          ))}
          <button onClick={()=>setShowTable(true)} style={{
            fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,
            padding:'5px 14px',borderRadius:16,
            border:'1px solid rgba(217,70,239,.5)',
            background:'rgba(217,70,239,.1)',color:'#d946ef',cursor:'pointer',textTransform:'uppercase',
          }}>All Recipes ↗</button>
        </div>
      </div>

      {/* TIER LABELS — fixed on left edge */}
      <div style={{position:'fixed',left:0,top:46,bottom:0,width:36,zIndex:200,pointerEvents:'none'}}>
        {[
          {label:'S',color:'#fb7185',top:56},
          {label:'A',color:'#7dd3fc',top:425},
          {label:'B',color:'#2dd4bf',top:885},
          {label:'C',color:'#fbbf24',top:1020},
        ].map(({label,color,top})=>(
          <div key={label} style={{
            position:'absolute',left:0,top:top+pan.y,
            fontFamily:"'DM Serif Display',serif",fontStyle:'italic',fontSize:32,
            color:color,opacity:.15,lineHeight:1,
            textShadow:`0 0 20px ${color}`,
            transition:'top .05s',
          }}>{label}</div>
        ))}
      </div>

      {/* CANVAS */}
      <div onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        style={{position:'absolute',inset:0,top:46,cursor:dragging?'grabbing':'grab',overflow:'hidden'}}>
        <div style={{position:'absolute',transform:`translate(${pan.x}px,${pan.y}px)`,width:CANVAS_W,height:CANVAS_H}}>

          {/* Column gradient zones */}
          {[
            {x:0,  w:230,bg:'rgba(251,113,133,.015)',label:'OUTPUTS'},
            {x:230,w:270,bg:'rgba(217,70,239,.015)', label:'BATTER CHAIN'},
            {x:500,w:740,bg:'rgba(167,139,250,.012)',label:'PROCESSING'},
            {x:1240,w:440,bg:'rgba(52,211,153,.015)',label:'RAW SOURCES'},
          ].map(z=>(
            <div key={z.x} style={{position:'absolute',left:z.x,top:0,width:z.w,height:CANVAS_H,
              background:z.bg,borderRight:'1px solid rgba(255,255,255,.025)'}}>
              <span style={{position:'absolute',top:8,left:10,
                fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:4,
                color:'rgba(255,255,255,.07)',textTransform:'uppercase'}}>{z.label}</span>
            </div>
          ))}

          {/* EDGES */}
          <svg style={{position:'absolute',inset:0,width:CANVAS_W,height:CANVAS_H,pointerEvents:'none',overflow:'visible'}}>
            <defs>
              <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
                <polygon points="0 0,7 2.5,0 5" fill="rgba(217,70,239,.3)"/>
              </marker>
              <marker id="arr-hi" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
                <polygon points="0 0,7 2.5,0 5" fill="rgba(217,70,239,.9)"/>
              </marker>
            </defs>
            {EDGES.filter(e=>!e.hidden).map((e,i)=>{
              if(!nodeMap[e.f]||!nodeMap[e.t])return null;
              const isConn=connectedSet&&(connectedSet.has(e.f)||connectedSet.has(e.t));
              const dim=!!selected&&!isConn;
              const fType=T[nodeMap[e.f].type];
              return(
                <path key={i} d={edgePath(e.f,e.t)} fill="none"
                  stroke={isConn?fType.c:'rgba(217,70,239,.25)'}
                  strokeWidth={isConn?2:1}
                  strokeOpacity={dim?.05:isConn?1:(e.dot?.15:.35)}
                  strokeDasharray={e.dot?'4 5':(isConn?'8 5':'none')}
                  markerEnd={isConn?'url(#arr-hi)':'url(#arr)'}
                  style={isConn?{animation:'flow .7s linear infinite'}:{}}
                />
              );
            })}
          </svg>

          {/* NODES */}
          {NODES.map(node=>{
            const ts=T[node.type];
            const isSel=selected===node.id;
            const isConn=connectedSet?.has(node.id);
            const dim=!!selected&&!connectedSet?.has(node.id);
            const isPill=['health','jetpack','stamina','hazard'].includes(node.type);
            return(
              <div key={node.id} className="nd"
                onClick={e=>{e.stopPropagation();setSelected(selected===node.id?null:node.id);}}
                style={{
                  position:'absolute',left:node.x,top:node.y,
                  width:NW,height:NH,
                  borderRadius:isPill?NH/2:7,
                  background:ts.bg,
                  border:`1px solid ${isSel||isConn?ts.c:ts.bdr}`,
                  boxShadow:isSel?`0 0 18px ${ts.c}55,0 0 36px ${ts.c}22`:isConn?`0 0 10px ${ts.c}33`:'none',
                  cursor:'pointer',
                  display:'flex',alignItems:'center',gap:7,padding:'0 10px',
                  opacity:dim?.15:1,
                  transition:'opacity .12s,border-color .12s,box-shadow .12s',
                  zIndex:isSel?10:1,
                  userSelect:'none',
                }}>
                <span style={{fontSize:14,flexShrink:0,opacity:.85}}>{node.icon}</span>
                <span style={{
                  fontFamily:"'DM Mono',monospace",
                  fontSize:node.label.length>18?8.5:9.5,
                  fontWeight:500,letterSpacing:.3,lineHeight:1.2,
                  color:isSel||isConn?ts.c:`${ts.c}cc`,
                }}>{node.label}</span>
                {isSel&&<div style={{
                  position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:'50%',
                  background:ts.c,boxShadow:`0 0 8px ${ts.c}`,
                  animation:'glow 1.2s ease-in-out infinite',
                }}/>}
              </div>
            );
          })}
        </div>
      </div>

      {/* FLOATING DETAIL CARD */}
      {selNode&&(()=>{
        const ts=T[selNode.type];
        return(
          <div style={{
            position:'fixed',left:cardX,top:cardY,width:290,zIndex:600,
            background:'#0e0812',border:`1px solid ${ts.c}`,borderRadius:10,padding:18,
            boxShadow:`0 0 28px ${ts.c}33,0 8px 30px rgba(0,0,0,.7)`,
            animation:'fadein .15s ease',
          }}>
            <button onClick={()=>setSelected(null)} style={{
              position:'absolute',top:8,right:10,background:'transparent',border:'none',
              color:'rgba(255,255,255,.3)',fontSize:18,cursor:'pointer'}}>×</button>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:3,color:ts.c,textTransform:'uppercase',marginBottom:5,opacity:.8}}>
              {ts.tag}
            </div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:19,color:'#f8f0ff',marginBottom:14,lineHeight:1.2}}>
              {selNode.label}
            </div>
            {selNode.effect&&(
              <div style={{
                display:'inline-block',marginBottom:12,
                fontFamily:"'DM Mono',monospace",fontSize:9,
                padding:'2px 12px',borderRadius:20,
                background:`${ts.c}20`,color:ts.c,border:`1px solid ${ts.c}44`,
              }}>{selNode.effect}</div>
            )}
            {selNode.recipe&&(
              <div style={{marginBottom:12}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:ts.c,letterSpacing:2,textTransform:'uppercase',marginBottom:7}}>Recipe</div>
                <div style={{background:'rgba(255,255,255,.03)',borderRadius:5,padding:'9px 11px',
                  border:'1px dashed rgba(255,255,255,.07)',
                  fontFamily:"'DM Mono',monospace",fontSize:10.5,color:'#c0a8d8',lineHeight:1.85}}>
                  {selNode.recipe.split(' · ').map((s,i)=><div key={i}>{s}</div>)}
                </div>
              </div>
            )}
            {selNode.how&&(
              <div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:ts.c,letterSpacing:2,textTransform:'uppercase',marginBottom:6}}>
                  {selNode.type==='raw'?'Where to Get':'Notes'}
                </div>
                <div style={{fontSize:12,color:'#7060a0',lineHeight:1.65}}>{selNode.how}</div>
              </div>
            )}
          </div>
        );
      })()}

      {/* TABLE MODAL */}
      {showTable&&(
        <div style={{position:'fixed',inset:0,zIndex:800,background:'rgba(0,0,0,.88)',backdropFilter:'blur(8px)',
          display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={()=>setShowTable(false)}>
          <div style={{width:'92%',maxWidth:1020,maxHeight:'86vh',background:'#0e0812',
            border:'1px solid rgba(217,70,239,.3)',borderRadius:12,overflow:'hidden',
            display:'flex',flexDirection:'column',animation:'fadein .18s ease'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{padding:'14px 22px',borderBottom:'1px solid rgba(217,70,239,.15)',
              display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontStyle:'italic',fontSize:21,color:'#f0f0ff'}}>
                  Complete Recipe Reference
                </div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(217,70,239,.5)',letterSpacing:2,textTransform:'uppercase',marginTop:3}}>
                  {tableRows.length} recipes · all cooking outputs from spreadsheet
                </div>
              </div>
              <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                {[['all','All'],['health','S · Health'],['jetpack','A · Jetpack'],['stamina','B · Stamina'],['hazard','C · Hazard'],['intermediate','Prep'],['utility','Utility'],['fish','Fish']].map(([k,l])=>(
                  <button key={k} onClick={()=>setTFilter(k)} style={{
                    fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:1,
                    padding:'3px 9px',borderRadius:10,textTransform:'uppercase',
                    border:`1px solid ${tFilter===k?'rgba(217,70,239,.7)':'rgba(217,70,239,.2)'}`,
                    background:tFilter===k?'rgba(217,70,239,.15)':'transparent',
                    color:tFilter===k?'#d946ef':'#6b5080',cursor:'pointer',whiteSpace:'nowrap',
                  }}>{l}</button>
                ))}
                <button onClick={()=>setShowTable(false)} style={{
                  marginLeft:8,background:'transparent',border:'none',
                  color:'rgba(255,255,255,.3)',fontSize:20,cursor:'pointer'}}>×</button>
              </div>
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead style={{position:'sticky',top:0,background:'#0e0812',zIndex:1}}>
                  <tr style={{borderBottom:'2px solid rgba(217,70,239,.25)'}}>
                    {['Output','Ingredient 1','Ingredient 2','Ingredient 3','Effect'].map(h=>(
                      <th key={h} style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,
                        color:'#d946ef',textTransform:'uppercase',padding:'9px 14px',textAlign:'left',fontWeight:500}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tableRows.map((r,i)=>{
                    const c=ecol(r[4]);
                    return(
                      <tr key={i} style={{borderBottom:'1px solid rgba(217,70,239,.06)',transition:'background .1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(217,70,239,.04)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <td style={{padding:'8px 14px',fontSize:13,color:'#e0d0f0',fontWeight:500}}>{r[0]}</td>
                        <td style={{padding:'8px 14px',fontSize:11,color:'#6b5080',fontFamily:"'DM Mono',monospace"}}>{r[1]}</td>
                        <td style={{padding:'8px 14px',fontSize:11,color:'#6b5080',fontFamily:"'DM Mono',monospace"}}>{r[2]}</td>
                        <td style={{padding:'8px 14px',fontSize:11,color:'#6b5080',fontFamily:"'DM Mono',monospace"}}>{r[3]}</td>
                        <td style={{padding:'8px 14px'}}>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,padding:'2px 9px',borderRadius:9,
                            background:`${c}18`,color:c,border:`1px solid ${c}33`}}>{r[4]}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      <div style={{position:'fixed',bottom:14,left:'50%',transform:'translateX(-50%)',
        fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,
        color:'rgba(217,70,239,.25)',textTransform:'uppercase',pointerEvents:'none'}}>
        drag to pan · click nodes · connected nodes highlight · use All Recipes for full table
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
